version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx
    - gocritic
    - misspell
    - whitespace
  settings:
    gosec:
      excludes:
        - G204  # exec.Command("gh", "auth", "token") is intentional and hardcoded

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gosec
        - errcheck
