version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - noctx
    - gocritic
    - misspell
    - whitespace
  settings:
    gosec:
      excludes:
        - G204  # exec.Command("gh", "auth", "token") is intentional and hardcoded
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck
